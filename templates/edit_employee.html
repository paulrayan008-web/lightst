<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style1.css') }}">
</head>
<body>


<div class="container">
    <h2>Update Employee</h2>

    <form method="POST">
        <input type="text" name="name" value="{{ emp[1] }}" required><br><br>
        <input type="email" name="email" value="{{ emp[2] }}" required><br><br>
        <input type="text" name="phone" value="{{ emp[3] }}" required><br><br>
        <input type="text" name="area" value="{{ emp[4] }}" required><br><br>
        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>
